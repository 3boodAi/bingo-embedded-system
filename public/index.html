<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Interactive Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>IoT Interactive Bingo</h1>
        </header>
        
        <section class="status-panel">
            <div class="player-info">Player: <span id="playerName">Waiting...</span></div>
            <div class="timer">Time: <span id="gameTimer">00:00</span></div>
        </section>

        <main>
            <div id="bingoBoard" class="bingo-grid">
                <!-- Grid cells will be generated dynamically by client.js -->
            </div>
            <div class="actions">
                <button id="claimBingoBtn" disabled>Claim BINGO</button>
            </div>
        </main>
    </div>
    <!-- Victory Modal -->
    <div id="victoryModal" class="modal hidden">
        <div class="modal-content">
            <h2>🎉 BINGO! 🎉</h2>
            <p>We have a winner!</p>
            <p class="winner-name" id="winnerNameDisplay"></p>
            <p class="winner-time" id="winnerTimeDisplay"></p>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
