<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bingo Game Arcade</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="app-shell">
      <!-- # Status Header -->
      <section class="topbar" aria-label="Arcade status">
        <div>
          <p class="eyebrow">Sultan / Hussam / Abdullah</p>
          <h1>Bingo Game Arcade</h1>
        </div>
        <div class="status-strip">
          <span id="socket-status" class="status-pill warn">Connecting</span>
          <span id="hardware-status" class="status-pill warn">Console offline</span>
        </div>
      </section>

      <!-- # Join Screen -->
      <section id="join-screen" class="panel active" aria-labelledby="join-title">
        <div class="panel-header">
          <p class="eyebrow">Arcade lobby</p>
          <h2 id="join-title">Join the shoebox console</h2>
        </div>
        <form id="join-form" class="join-form">
          <label for="player-name">Player name</label>
          <div class="form-row">
            <input id="player-name" name="playerName" autocomplete="name" maxlength="14" placeholder="Your name" required>
            <button type="submit">Join</button>
          </div>
        </form>
        <p id="join-message" class="message"></p>
      </section>

      <!-- # Lobby Screen -->
      <section id="lobby-screen" class="panel" aria-labelledby="lobby-title">
        <div class="panel-header">
          <p class="eyebrow">Waiting room</p>
          <h2 id="lobby-title">Three players, one console</h2>
        </div>
        <div id="players-list" class="players-list"></div>
        <div class="lobby-actions">
          <label class="ready-toggle">
            <input id="ready-toggle" type="checkbox">
            <span>I am ready</span>
          </label>
          <button id="start-button" type="button" disabled>Start Game</button>
          <button id="reset-lobby-button" type="button" class="secondary">Reset</button>
        </div>
        <p id="lobby-message" class="message"></p>
      </section>

      <!-- # Countdown Screen -->
      <section id="countdown-screen" class="panel center" aria-live="polite">
        <p class="eyebrow">Hands on cards</p>
        <h2 id="countdown-value">3</h2>
        <p>The arcade console is starting the round.</p>
      </section>

      <!-- # Game Screen -->
      <section id="game-screen" class="game-layout" aria-labelledby="game-title">
        <div class="game-info">
          <div>
            <p class="eyebrow">Active game</p>
            <h2 id="game-title">Watch the console for numbers</h2>
          </div>
          <div class="metrics">
            <span id="timer-display">00:00</span>
            <span id="called-count">0 called</span>
          </div>
        </div>
        <div id="bingo-card" class="bingo-card" aria-label="Bingo card"></div>
        <div class="game-actions">
          <button id="claim-button" type="button" disabled>Claim Bingo</button>
          <button id="reset-game-button" type="button" class="secondary">Reset</button>
        </div>
        <p id="game-message" class="message"></p>
      </section>

      <!-- # Winner Screen -->
      <section id="winner-screen" class="panel center" aria-live="polite">
        <p class="eyebrow">Game over</p>
        <h2 id="winner-title">Bingo!</h2>
        <p id="winner-detail" class="winner-detail"></p>
        <button id="play-again-button" type="button">Back to Lobby</button>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
  </body>
</html>
